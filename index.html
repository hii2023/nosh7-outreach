<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #0a2342 0%, #0e4d6e 40%, #0d7d9e 75%, #1ab3cc 100%);
            background-attachment: fixed;
            color: #fff;
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 3.5rem 1.5rem 2rem;
        }
        .hero-title {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .hero-title span {
            background: linear-gradient(90deg, #7df9ff, #a8edff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-sub {
            color: rgba(255,255,255,0.6);
            margin-top: 0.4rem;
            font-size: 0.9rem;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        .stat-pill {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.9);
        }
        .stat-pill strong { color: #fff; }

        /* ── CONTROLS ── */
        .controls {
            max-width: 680px;
            margin: 1.75rem auto 0;
            padding: 0 1.5rem;
        }
        .search-wrap { position: relative; }
        .search-wrap input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
        .search-wrap input:focus {
            border-color: rgba(125,249,255,0.6);
            background: rgba(255,255,255,0.15);
        }
        .search-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.95rem;
            pointer-events: none;
        }

        /* ── GROUP FILTERS ── */
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.9rem;
            justify-content: center;
        }
        .filter-btn {
            padding: 0.38rem 1rem;
            border-radius: 30px;
            border: 1.5px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
        .filter-btn.active {
            background: rgba(125,249,255,0.22);
            border-color: #7df9ff;
            color: #7df9ff;
        }

        /* ── GRID ── */
        .container {
            max-width: 1160px;
            margin: 2rem auto 4rem;
            padding: 0 1.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 1.4rem;
        }

        /* ── GROUP LABEL ── */
        .group-label {
            grid-column: 1 / -1;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            padding-bottom: 0.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            margin-top: 0.75rem;
        }

        /* ── CARD ── */
        .card {
            background: rgba(255,255,255,0.97);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #1a1a2e;
            transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s;
        }
        .card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 18px 48px rgba(0,0,0,0.28);
        }

        /* Banner */
        .card-banner {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            line-height: 1;
            position: relative;
            flex-shrink: 0;
            cursor: pointer;
        }
        .badge {
            position: absolute;
            top: 9px; right: 10px;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.18rem 0.55rem;
            border-radius: 20px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .badge-live { background: rgba(255,255,255,0.28); color: #fff; }
        .badge-github { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.85); }

        /* Body */
        .card-body {
            padding: 1rem 1.1rem 1.1rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-name {
            font-size: 0.98rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.35rem;
            word-break: break-word;
            cursor: pointer;
            text-decoration: none;
        }
        .card-name:hover { color: #0077b6; }

        .card-url {
            font-size: 0.68rem;
            color: #9ca3af;
            margin-bottom: 0.55rem;
            word-break: break-all;
            text-decoration: none;
        }
        .card-url:hover { color: #0077b6; text-decoration: underline; }

        .card-desc {
            font-size: 0.83rem;
            color: #6b7280;
            line-height: 1.55;
            flex-grow: 1;
            margin-bottom: 0.85rem;
        }
        .card-desc.empty { font-style: italic; color: #c0c4cc; }

        /* ── SUB-PAGES SECTION ── */
        .subpages {
            margin-bottom: 0.85rem;
        }
        .subpages-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 0.45rem;
        }
        .subpages-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }
        /* Clickable chip — real pages & anchors */
        a.chip {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 0.28rem 0.65rem;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.15s;
            cursor: pointer;
        }
        a.chip.page {
            background: #eff6ff;
            color: #2563eb;
            border: 1px solid #bfdbfe;
        }
        a.chip.page:hover {
            background: #dbeafe;
            border-color: #93c5fd;
        }
        a.chip.anchor {
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }
        a.chip.anchor:hover {
            background: #dcfce7;
            border-color: #86efac;
        }
        /* Non-clickable chip — SPA tabs */
        span.chip {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 0.28rem 0.65rem;
            border-radius: 20px;
            background: #f3f4f6;
            color: #9ca3af;
            border: 1px solid #e5e7eb;
            cursor: default;
        }

        /* ── CARD FOOTER ── */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding-top: 0.65rem;
            border-top: 1px solid #f3f4f6;
        }
        .updated { font-size: 0.68rem; color: #c0c4cc; }
        .open-btn {
            font-size: 0.73rem;
            font-weight: 600;
            padding: 0.36rem 0.85rem;
            border-radius: 8px;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }
        .open-btn:hover { opacity: 0.82; }
        .btn-live   { background: #0077b6; color: #fff; }
        .btn-github { background: #1f2937; color: #fff; }

        /* ── STATES ── */
        .state-box {
            text-align: center;
            padding: 4rem 1rem;
            color: rgba(255,255,255,0.55);
            grid-column: 1/-1;
        }
        .spinner {
            display: inline-block;
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #7df9ff;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin-bottom: 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-results {
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
            display: none;
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
        }
        footer a { color: rgba(255,255,255,0.38); text-decoration: none; }
        footer a:hover { color: rgba(255,255,255,0.65); }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

/* ── BANNER COLOURS (ocean palette) ── */
const BANNERS = [
    'linear-gradient(135deg,#0077b6,#00b4d8)',
    'linear-gradient(135deg,#023e8a,#0096c7)',
    'linear-gradient(135deg,#0089a7,#48cae4)',
    'linear-gradient(135deg,#005f73,#0a9396)',
    'linear-gradient(135deg,#03045e,#0077b6)',
    'linear-gradient(135deg,#0582ca,#06d6a0)',
    'linear-gradient(135deg,#00b4d8,#90e0ef)',
    'linear-gradient(135deg,#1d3557,#457b9d)',
];

/* ── ICONS ── */
const ICON_MAP = [
    ['whatsapp','💬'],['crm','📊'],['nosh7','🍱'],['food','🍽️'],
    ['landing','🌐'],['outreach','📣'],['growth','📈'],['lead','🎯'],
    ['invitation','💌'],['invite','💌'],['business','💼'],
    ['item','📦'],['test','🧪'],['tool','🔧'],['sapna','✨'],
];
function getIcon(name) {
    const l = name.toLowerCase();
    for (const [k,i] of ICON_MAP) if (l.includes(k)) return i;
    return '📁';
}

/* ── DESCRIPTIONS ── */
const SMART_DESC = {
    'nosh7-whatsapp-crm':  'WhatsApp CRM system for Nosh7 subscription management',
    'nosh7-crm':           'Customer relationship management dashboard for Nosh7',
    'nosh7-outreach':      'Outreach and marketing automation tool for Nosh7',
    'landing-page-nosh7':  'Partner landing page for Nosh7 nutritionists & dietitians',
    'nosh7-in':            'Nosh7 main website — fresh salad delivery, Ahmedabad',
    'nosh7in':             'Nosh7 Ahmedabad — salad subscription & health blog',
    'growth-hub':          '5-track learning hub — sales, negotiation, AI & more',
    'invitation':          'Digital wedding invitation — Heena & Azaz',
    'leaqualify':          'Lead qualification & scoring tool for Nosh7 sales',
    'BusinessFirst':       'Digital business starter page with services & pricing',
    'item':                'NOSH7 Juice Launch Tracker — pricing & launch checklist',
    'Test-Writing-Tool':   'Sales message generator for WhatsApp, email & calls',
    'SAPNA':               "Sapna's Art Studio — handcrafted with love",
};
function getDesc(repo) {
    if (repo.description) return { text: repo.description, empty: false };
    const s = SMART_DESC[repo.name];
    return s ? { text: s, empty: false } : { text: 'No description yet.', empty: true };
}

/* ── GROUP LOGIC ── */
const GROUP_ORDER  = ['nosh7','websites','tools','other'];
const GROUP_LABELS = {
    nosh7:    '🍱  Nosh7 Projects',
    websites: '🌐  Websites',
    tools:    '🔧  Tools & Apps',
    other:    '📁  Other',
};
function getGroup(name) {
    const l = name.toLowerCase();
    if (l.includes('nosh7') || l.includes('nosh'))                             return 'nosh7';
    if (['sapna','test-writing-tool','growth-hub','leaqualify'].includes(l))   return 'tools';
    if (['item','businessfirst','invitation'].includes(l))                      return 'websites';
    return 'other';
}

/* ── TIME ── */
function timeAgo(d) {
    const s = Math.floor((Date.now() - new Date(d)) / 1000);
    if (s < 60)      return 'just now';
    if (s < 3600)    return `${Math.floor(s/60)}m ago`;
    if (s < 86400)   return `${Math.floor(s/3600)}h ago`;
    if (s < 2592000) return `${Math.floor(s/86400)}d ago`;
    return new Date(d).toLocaleDateString('en-IN',{month:'short',year:'numeric'});
}

/* ── BUILD CARD HTML ── */
function buildCard(repo, idx) {
    const data     = SITE_DATA[repo.name] || {};
    const liveUrl  = data.liveUrl || null;
    const mainUrl  = liveUrl || repo.html_url;
    const isLive   = !!liveUrl;
    const subpages = data.subpages || [];
    const desc     = getDesc(repo);
    const icon     = getIcon(repo.name);
    const banner   = BANNERS[idx % BANNERS.length];
    const displayUrl = liveUrl
        ? liveUrl.replace(/^https?:\/\//, '').replace(/\/$/, '')
        : repo.html_url.replace('https://github.com/', 'github.com/');

    /* Sub-page chips */
    let subHtml = '';
    if (subpages.length) {
        const typeLabel = subpages[0].type === 'page'   ? 'Sub-pages'
                        : subpages[0].type === 'anchor' ? 'Sections'
                        : 'App views';
        const chips = subpages.map(sp => {
            if (sp.type === 'tab' || !sp.url) {
                return `<span class="chip" title="In-app view (no direct link)">${sp.label}</span>`;
            }
            const cls = sp.type === 'page' ? 'page' : 'anchor';
            const icon = sp.type === 'page' ? '↗' : '#';
            return `<a class="chip ${cls}" href="${sp.url}" target="_blank" onclick="event.stopPropagation()">${icon} ${sp.label}</a>`;
        }).join('');

        subHtml = `
            <div class="subpages">
                <div class="subpages-label">${typeLabel}</div>
                <div class="subpages-chips">${chips}</div>
            </div>`;
    }

    return `
        <div class="card"
             data-group="${getGroup(repo.name)}"
             data-search="${repo.name.toLowerCase()} ${(repo.description||'').toLowerCase()} ${(data.title||'').toLowerCase()}"
             onclick="window.open('${mainUrl}','_blank')">

            <div class="card-banner" style="background:${banner}">
                ${icon}
                <span class="badge ${isLive ? 'badge-live' : 'badge-github'}">${isLive ? '● Live' : 'GitHub'}</span>
            </div>

            <div class="card-body">
                <a class="card-name" href="${mainUrl}" target="_blank" onclick="event.stopPropagation()">${data.title || repo.name}</a>
                <a class="card-url"  href="${mainUrl}" target="_blank" onclick="event.stopPropagation()">${displayUrl}</a>
                <p class="card-desc ${desc.empty ? 'empty' : ''}">${desc.text}</p>

                ${subHtml}

                <div class="card-footer">
                    <span class="updated">Updated ${timeAgo(repo.updated_at)}</span>
                    <a class="open-btn ${isLive ? 'btn-live' : 'btn-github'}"
                       href="${mainUrl}"
                       target="_blank"
                       onclick="event.stopPropagation()">
                        ${isLive ? '🔗 Open Site' : 'GitHub →'}
                    </a>
                </div>
            </div>
        </div>`;
}

/* ── FILTER / GROUP ── */
let activeGroup = 'all';

function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    document.querySelectorAll('.group-label').forEach(l => l.remove());
    const cards = document.querySelectorAll('.card');
    let visible = 0;
    cards.forEach(c => {
        const ok = (activeGroup === 'all' || c.dataset.group === activeGroup)
                && (!q || c.dataset.search.includes(q));
        c.style.display = ok ? '' : 'none';
        if (ok) visible++;
    });
    if (activeGroup === 'all' && !q) insertGroupLabels();
    document.getElementById('no-results').style.display = visible ? 'none' : 'block';
}

function setGroup(g, btn) {
    activeGroup = g;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
}

function insertGroupLabels() {
    const grid  = document.getElementById('repos-grid');
    const cards = [...grid.querySelectorAll('.card')].filter(c => c.style.display !== 'none');
    let last = null;
    cards.forEach(card => {
        const g = card.dataset.group;
        if (g !== last) {
            const lbl = document.createElement('div');
            lbl.className = 'group-label';
            lbl.textContent = GROUP_LABELS[g] || '📁  Other';
            grid.insertBefore(lbl, card);
            last = g;
        }
    });
}

/* ── FETCH ── */
async function fetchRepos() {
    let page = 1, all = [];
    while (true) {
        const r = await fetch(`https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=updated&page=${page}`);
        const repos = await r.json();
        if (!Array.isArray(repos) || !repos.length) break;
        all = all.concat(repos);
        if (repos.length < 100) break;
        page++;
    }
    return all;
}

/* ── MAIN ── */
async function init() {
    try {
        const repos = await fetchRepos();

        /* Stats */
        const liveCount = Object.values(SITE_DATA).filter(d => d.liveUrl).length;
        const langs     = [...new Set(repos.map(r => r.language).filter(Boolean))];
        const pagesCount = Object.values(SITE_DATA)
            .flatMap(d => (d.subpages||[]).filter(p => p.url)).length;

        document.getElementById('stats').innerHTML = `
            <div class="stat-pill"><strong>${repos.length}</strong> Projects</div>
            <div class="stat-pill"><strong>${liveCount}</strong> Live Sites</div>
            <div class="stat-pill"><strong>${pagesCount}</strong> Sub-pages</div>
            <div class="stat-pill"><strong>${langs.length}</strong> Languages</div>
        `;

        /* Sort by group then recency */
        const sorted = [...repos].sort((a,b) => {
            const ga = GROUP_ORDER.indexOf(getGroup(a.name));
            const gb = GROUP_ORDER.indexOf(getGroup(b.name));
            if (ga !== gb) return ga - gb;
            return new Date(b.updated_at) - new Date(a.updated_at);
        });

        document.getElementById('repos-grid').innerHTML = sorted.map(buildCard).join('');
        insertGroupLabels();

    } catch (err) {
        document.getElementById('repos-grid').innerHTML = `
            <div class="state-box">
                ⚠️ Could not load projects. Check your connection and try again.<br>
                <small style="opacity:.5;font-size:.8rem">${err.message}</small>
            </div>`;
    }
}

init();
</script>
